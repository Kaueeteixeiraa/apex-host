<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Apex Host Fallback</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #020713;
        color: #eef7ff;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background:
          radial-gradient(circle at 20% 10%, rgba(0, 109, 255, 0.26), transparent 34rem),
          radial-gradient(circle at 80% 80%, rgba(24, 182, 255, 0.16), transparent 30rem),
          #020713;
      }
      main {
        width: min(92vw, 560px);
        border: 1px solid rgba(24, 182, 255, 0.34);
        border-radius: 14px;
        padding: 28px;
        background: rgba(7, 18, 33, 0.78);
        box-shadow: 0 0 0 1px rgba(24, 182, 255, 0.18), 0 22px 80px rgba(0, 109, 255, 0.2);
        backdrop-filter: blur(18px);
        text-align: center;
      }
      .mark {
        width: 72px;
        height: 72px;
        margin: 0 auto 18px;
        border: 1px solid rgba(24, 182, 255, 0.58);
        border-radius: 18px;
        display: grid;
        place-items: center;
        color: #18b6ff;
        font-size: 32px;
        font-weight: 800;
        box-shadow: 0 0 34px rgba(24, 182, 255, 0.34);
      }
      h1 {
        margin: 0;
        font-size: clamp(26px, 5vw, 40px);
      }
      p {
        color: #8ea7c7;
        line-height: 1.6;
      }
      .bar {
        height: 6px;
        margin-top: 22px;
        overflow: hidden;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.08);
      }
      .bar span {
        display: block;
        height: 100%;
        width: 42%;
        border-radius: inherit;
        background: #18b6ff;
        box-shadow: 0 0 22px rgba(24, 182, 255, 0.7);
        animation: pulse 1.5s ease-in-out infinite alternate;
      }
      @keyframes pulse {
        from { transform: translateX(-20%); }
        to { transform: translateX(150%); }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="mark">A</div>
      <h1>Site temporariamente instável</h1>
      <p>O Apex Host detectou uma falha e está tentando recuperar este projeto automaticamente. Se houver fallback/CDN configurado, a última versão estável pode continuar disponível em cache.</p>
      <div class="bar"><span></span></div>
    </main>
  </body>
</html>
