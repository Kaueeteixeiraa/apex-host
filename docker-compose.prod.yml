services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-apex_host}
      POSTGRES_USER: ${POSTGRES_USER:-apex_host}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-apex_host} -d ${POSTGRES_DB:-apex_host}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging: &default-logging
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      ENVIRONMENT: production
      DATA_DIR: /data
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL}
      NGINX_SITES_DIR: /etc/nginx/project-sites
      NGINX_UPSTREAM_HOST: host.docker.internal
      NGINX_TEST_COMMAND: docker exec apex-host-nginx nginx -t
      NGINX_RELOAD_COMMAND: docker exec apex-host-nginx nginx -s reload
    command: sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers --forwarded-allow-ips='*'"
    volumes:
      - apex_data:/data
      - ./data/backups:/data/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx_project_sites:/etc/nginx/project-sites
    expose:
      - "8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - apps
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=3)\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  worker:
    build:
      context: ./backend
    restart: unless-stopped
    command: python -m app.worker
    env_file:
      - .env.production
    environment:
      APP_ENV: production
      ENVIRONMENT: production
      DATA_DIR: /data
      REDIS_URL: ${REDIS_URL:-redis://redis:6379/0}
      DATABASE_URL: ${DATABASE_URL}
      NGINX_SITES_DIR: /etc/nginx/project-sites
      NGINX_UPSTREAM_HOST: host.docker.internal
      NGINX_TEST_COMMAND: docker exec apex-host-nginx nginx -t
      NGINX_RELOAD_COMMAND: docker exec apex-host-nginx nginx -s reload
    volumes:
      - apex_data:/data
      - ./data/backups:/data/backups
      - /var/run/docker.sock:/var/run/docker.sock
      - nginx_project_sites:/etc/nginx/project-sites
    depends_on:
      backend:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
      - apps
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, redis; redis.from_url(os.environ.get('REDIS_URL', 'redis://redis:6379/0'), socket_connect_timeout=3).ping(); print('worker dependencies ok')\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  frontend:
    build:
      context: ./frontend
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      VITE_API_URL: ${API_URL}
    command: sh -c "npm run build && npm run preview -- --port 5173 --host 0.0.0.0"
    expose:
      - "5173"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "node -e \"fetch('http://127.0.0.1:5173').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging: *default-logging

  nginx:
    image: nginx:1.27-alpine
    container_name: apex-host-nginx
    restart: unless-stopped
    env_file:
      - .env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/apex-host.prod.conf:/etc/nginx/conf.d/default.conf:ro
      - nginx_project_sites:/etc/nginx/project-sites:ro
      - ./data/certbot/www:/var/www/certbot
      - ./data/letsencrypt:/etc/letsencrypt
      - ./data/nginx-fallback:/var/www/apex-host
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - internal
      - apps
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD-SHELL", "nginx -t"]
      interval: 30s
      timeout: 5s
      retries: 5
    logging: *default-logging

  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      BACKUP_RETENTION_DAYS: ${BACKUP_RETENTION_DAYS:-14}
    volumes:
      - ./data/backups:/backups
    networks:
      - internal
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c 'while true; do
      stamp=$$(date +%Y%m%d-%H%M%S);
      pg_dump -h postgres -U "$${POSTGRES_USER:-apex_host}" "$${POSTGRES_DB:-apex_host}" | gzip > "/backups/apex_host-$$stamp.sql.gz";
      find /backups -name "apex_host-*.sql.gz" -mtime +"$${BACKUP_RETENTION_DAYS:-14}" -delete;
      sleep 86400;
      done'
    logging: *default-logging

networks:
  internal:
    name: ${DOCKER_NETWORK:-apex-host-internal}
    internal: true
  apps:
    name: ${DOCKER_APPS_NETWORK:-apex-host-apps}

volumes:
  postgres_data:
  redis_data:
  apex_data:
  nginx_project_sites:
